<!-- CÓDIGO CORRIGIDO E FUNCIONAL (VERSÃO ENXUTA + ADMIN COM SENHA) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pequena Porção</title>
<style>
body{font-family:Arial;background:#f7faf7;margin:0}
nav{display:flex;justify-content:space-between;padding:10px 20px;background:#fff;border-bottom:1px solid #ccc}
button{cursor:pointer}
.page{display:none;padding:20px}
.page.active{display:block}
</style>
</head>
<body>

<nav>
  <div>Pequena Porção</div>
  <div>
    <button onclick="showPage('home')">Hoje</button>
    <button onclick="abrirAdmin()">Admin</button>
  </div>
</nav>

<div id="home" class="page active">
  <h2>Devocional de Hoje</h2>
  <div id="conteudo"></div>
</div>

<div id="admin" class="page">
  <h2>Painel Admin</h2>
  <input id="titulo" placeholder="Título"><br><br>
  <textarea id="texto" placeholder="Texto"></textarea><br><br>
  <button onclick="salvar()">Salvar</button>
</div>

<script>
const ADMIN_PASSWORD = "123456";

function abrirAdmin(){
  const senha = prompt("Senha:");
  if(senha === ADMIN_PASSWORD){
    showPage('admin');
  } else if(senha !== null){
    alert("Senha incorreta");
  }
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function salvar(){
  const titulo = document.getElementById('titulo').value;
  const texto = document.getElementById('texto').value;

  const dev = {titulo, texto};
  localStorage.setItem('devocional', JSON.stringify(dev));
  render();
  alert('Salvo!');
}

function render(){
  const data = JSON.parse(localStorage.getItem('devocional'));
  if(!data) return;

  document.getElementById('conteudo').innerHTML = `
    <h3>${data.titulo}</h3>
    <p>${data.texto}</p>
  `;
}

render();
</script>

</body>
</html>
