name: Gerar Devocional Diário

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Criar script de geração
        run: |
          cat > gerar.mjs << 'ENDOFSCRIPT'
          import https from 'https';

          function httpsPost(hostname, path, headers, body) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify(body);
              const req = https.request({
                hostname,
                path,
                method: 'POST',
                headers: { ...headers, 'Content-Length': Buffer.byteLength(data) }
              }, res => {
                let raw = '';
                res.on('data', c => raw += c);
                res.on('end', () => {
                  try {
                    resolve(JSON.parse(raw));
                  } catch(e) {
                    console.error('Resposta bruta:', raw.substring(0, 500));
                    reject(new Error('JSON invalido: ' + e.message));
                  }
                });
              });
              req.on('error', reject);
              req.write(data);
              req.end();
            });
          }

          async function main() {
            const hoje = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Sao_Paulo' });
            console.log('Gerando devocional para:', hoje);

            const livros = ['Igreja Centrada','O Deus Prodigo','Ego Transformado','A Fe na Era do Ceticismo','Oracao','Deuses Falsos'];
            const livro = livros[Math.floor(Math.random() * livros.length)];
            console.log('Livro de referencia:', livro);

            const prompt = 'Voce e um pastor reformado especialista na teologia de Tim Keller. Crie um devocional cristao completo em portugues brasileiro. Use o livro "' + livro + '" de Tim Keller como referencia. REGRAS: versiculo da NVI 2013, linguagem natural, sem travessao, prosa fluida, centrado no evangelho. Responda SOMENTE com JSON valido sem markdown: {"titulo":"titulo curto provocativo","tema":"categoria","versiculo_texto":"texto NVI 2013","versiculo_ref":"Livro Cap:Ver","reflexao":"2-3 paragrafos com newline duplo entre eles","aplicacao":"aplicacao pratica","oracao":"oracao primeira pessoa max 3 linhas","referencia":"' + livro + '"}';

            const aiRes = await httpsPost('api.anthropic.com', '/v1/messages', {
              'Content-Type': 'application/json',
              'x-api-key': process.env.ANTHROPIC_API_KEY,
              'anthropic-version': '2023-06-01'
            }, {
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 1500,
              messages: [{ role: 'user', content: prompt }]
            });

            if (aiRes.error) {
              throw new Error('Erro da API Anthropic: ' + JSON.stringify(aiRes.error));
            }

            const text = (aiRes.content || []).map(c => c.text || '').join('').trim();
            console.log('Resposta IA:', text.substring(0, 300));

            const jsonMatch = text.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error('Nenhum JSON encontrado');

            const dev = JSON.parse(jsonMatch[0]);
            dev.data = hoje;
            dev.tipo = 'ia';
            console.log('Titulo:', dev.titulo);

            const supabaseHost = process.env.SUPABASE_URL.replace('https://', '');
            const saveRes = await httpsPost(supabaseHost, '/rest/v1/devocionais', {
              'Content-Type': 'application/json',
              'apikey': process.env.SUPABASE_SECRET_KEY,
              'Authorization': 'Bearer ' + process.env.SUPABASE_SECRET_KEY,
              'Prefer': 'resolution=merge-duplicates,return=minimal'
            }, dev);

            if (saveRes && saveRes.code) {
              throw new Error('Erro Supabase: ' + JSON.stringify(saveRes));
            }

            console.log('Salvo com sucesso!');
          }

          main().catch(e => { console.error('ERRO:', e.message); process.exit(1); });
          ENDOFSCRIPT

      - name: Gerar e salvar devocional
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node gerar.mjs
